<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Hardstyle Controller</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow:hidden; background:#04000a; color:#fff; font-family:Arial,sans-serif; }
.pg { display:none; flex-direction:column; align-items:center; justify-content:center; height:100vh; padding:24px 20px; gap:14px; text-align:center; }
.pg.show { display:flex; }
h1 { font-size:1.4rem; letter-spacing:.1em; background:linear-gradient(90deg,#ff0080,#00f5ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
p  { font-size:.82rem; color:rgba(255,255,255,.42); line-height:1.7; max-width:280px; }
input[type=text] {
  width:100%; max-width:280px; text-align:center;
  background:rgba(255,255,255,.07); border:2px solid rgba(255,255,255,.2);
  color:#fff; padding:11px 8px; border-radius:6px; outline:none;
  -webkit-appearance:none; font-size:1rem;
}
input[type=text]:focus { border-color:#00f5ff; }
#code { font-size:2rem; letter-spacing:.3em; }
button.btn {
  width:100%; max-width:280px; padding:14px;
  font-size:.88rem; font-weight:700; letter-spacing:.1em;
  border:none; border-radius:6px; cursor:pointer;
  -webkit-appearance:none; transition:opacity .15s;
}
button.btn:active { opacity:.7; }
button.btn:disabled { opacity:.3; }
.pink  { background:#ff0080; color:#000; }
.dim   { background:transparent !important; border:1px solid rgba(255,255,255,.2) !important; color:rgba(255,255,255,.4); font-size:.8rem; }
#msg { font-size:.8rem; min-height:1.2em; }
#msg.ok  { color:#00ff88; }
#msg.err { color:#ff5555; }
#msg.inf { color:rgba(255,255,255,.38); }
/* play screen */
#pg-play { background:radial-gradient(ellipse at center,#0e001f,#04000a); position:relative; }
#info { font-size:.6rem; color:rgba(255,255,255,.25); letter-spacing:.08em; max-width:88vw; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.hrow { display:flex; gap:18px; align-items:baseline; }
#sc { font-size:1.8rem; font-weight:700; color:#00f5ff; }
#cb { font-size:1rem; color:#ffee00; }
#fb { font-size:1.4rem; font-weight:700; min-height:1.7rem; transition:opacity .2s; }
/* KICK BUTTON */
#kick {
  width: min(68vw,56vh); height: min(68vw,56vh);
  border-radius: 50%; position:relative; flex-shrink:0;
  border: 3px solid var(--pc,#ff0080);
  background: rgba(0,0,0,.1);
  box-shadow: 0 0 26px color-mix(in srgb, var(--pc,#ff0080) 40%, transparent);
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:5px;
  cursor:pointer; -webkit-appearance:none; appearance:none;
  transition: transform .06s, box-shadow .06s;
  touch-action:none;
}
#kick.hi {
  transform:scale(.91);
  box-shadow: 0 0 50px var(--pc,#ff0080);
}
#kick span { font-size:1rem; font-weight:700; letter-spacing:.15em; pointer-events:none; color:rgba(255,255,255,.85); }
#kick small { font-size:.6rem; color:rgba(255,255,255,.3); pointer-events:none; }
.sens-row { display:flex; align-items:center; gap:8px; font-size:.68rem; color:rgba(255,255,255,.3); }
.sens-row input { width:80px; }
.mbar-bg { width:68px; height:4px; background:rgba(255,255,255,.07); border-radius:2px; overflow:hidden; }
#mbar { height:100%; width:0%; border-radius:2px; transition:width .04s; }
#mlbl { font-size:.58rem; color:rgba(255,255,255,.24); }
#disc { position:fixed; top:12px; right:12px; padding:6px 12px; background:transparent; border:1px solid rgba(255,255,255,.14); color:rgba(255,255,255,.28); font-size:.62rem; cursor:pointer; border-radius:4px; -webkit-appearance:none; }
#disc:active { color:#ff0080; border-color:#ff0080; }
#perm-note { font-size:.76rem; min-height:1em; }
</style>
</head>
<body>

<!-- SCHERM 1: iOS TOESTEMMING -->
<div class="pg show" id="pg-perm">
  <h1>HARDSTYLE HERO</h1>
  <p style="font-size:2rem;margin:0">📳</p>
  <p>iOS vereist toestemming voor de bewegingssensor.</p>
  <button class="btn pink" onclick="askPerm()">BEWEGINGSSENSOR TOESTAAN</button>
  <button class="btn dim"  onclick="skipPerm()">Overslaan</button>
  <p id="perm-note"></p>
</div>

<!-- SCHERM 2: VERBINDEN -->
<div class="pg" id="pg-conn">
  <h1>HARDSTYLE HERO</h1>
  <p>Vul je naam in, kies moeilijkheid en voer de spelcode in</p>
  <input type="text" id="pname" placeholder="Jouw naam" maxlength="14" autocomplete="off" spellcheck="false">
  <input type="text" id="code" inputmode="numeric" maxlength="6" placeholder="000000" autocomplete="off" spellcheck="false">
  <button class="btn pink" id="conn-btn" onclick="doConn()">VERBINDEN</button>
  <div id="msg" class="inf">Klaar</div>
</div>

<!-- SCHERM 3: SPELEN -->
<div class="pg" id="pg-play">
  <button id="disc" onclick="doDisc()">LOSKOPPELEN</button>
  <div id="info">—</div>
  <div class="hrow"><div id="sc">000000</div><div id="cb">x1</div></div>
  <div id="fb" style="opacity:0">PERFECT!</div>
  <button id="kick"
          ontouchstart="onTouchHit(event)" ontouchend="onTouchEnd(event)"
          onmousedown="onHit()" onmouseup="onUnhit()">
    <span>KICK</span>
    <small id="khint">tik of schud</small>
  </button>
  <div class="sens-row">
    🌀
    <input type="range" min="1" max="20" value="8" oninput="setSens(+this.value)">
    <div class="mbar-bg"><div id="mbar"></div></div>
  </div>
  <div id="mlbl">—</div>
</div>

<script src="https://unpkg.com/mqtt@5.3.4/dist/mqtt.min.js"></script>
<script>
'use strict';

// ── iOS permission ──
const isIOS = typeof DeviceMotionEvent !== 'undefined'
           && typeof DeviceMotionEvent.requestPermission === 'function';
let motionOK = !isIOS;
if (!isIOS) show('pg-conn');

// Pre-fill code from URL
const urlCode = new URLSearchParams(location.search).get('code');
if (urlCode) document.getElementById('code').value = urlCode;

function show(id) {
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('show'));
  document.getElementById(id).classList.add('show');
}

function askPerm() {
  DeviceMotionEvent.requestPermission().then(s => {
    const n = document.getElementById('perm-note');
    motionOK = s === 'granted';
    n.textContent = motionOK ? '✓ Toegestaan!' : 'Geweigerd — gebruik de knop.';
    n.style.color  = motionOK ? '#00ff88' : '#ff9944';
    setTimeout(() => show('pg-conn'), 700);
  }).catch(() => {
    document.getElementById('perm-note').textContent = 'Niet beschikbaar.';
    setTimeout(() => show('pg-conn'), 700);
  });
}
function skipPerm() { show('pg-conn'); }

// ── MQTT ──
const WS_BROKER = 'wss://broker.hivemq.com:8884/mqtt';
let mqttClient = null, roomCode = '', hitSeq = 0, tapCD = false;

// Persistent player ID
let pid = sessionStorage.getItem('hsh-pid');
if (!pid) { pid = 'p' + Math.random().toString(36).slice(2,10); sessionStorage.setItem('hsh-pid',pid); }

function setMsg(t,c){ const e=document.getElementById('msg'); e.textContent=t; e.className=c||'inf'; }

function doConn() {
  roomCode = document.getElementById('code').value.replace(/\D/g,'');
  if (roomCode.length !== 6) { setMsg('Voer 6 cijfers in','err'); return; }
  document.getElementById('conn-btn').disabled = true;
  setMsg('Verbinden…','inf');
  connectMqtt();
}

function connectMqtt() {
  if (mqttClient) { try{mqttClient.end(true);}catch(e){} }
  mqttClient = mqtt.connect(WS_BROKER, { clientId:'hsh-mob-'+pid, clean:true, reconnectPeriod:3000, connectTimeout:10000 });
  mqttClient.on('connect', () => {
    mqttClient.subscribe('hardstyle-hero/'+roomCode+'/host', err => {
      if (!err) {
        setMsg('Wachten op spelscherm…','inf');
        const name = document.getElementById('pname').value.trim() || 'Speler';
        mqttPub({ type:'join', name });
      } else {
        setMsg('Subscribe mislukt','err');
        document.getElementById('conn-btn').disabled = false;
      }
    });
  });
  mqttClient.on('message', (topic, payload) => {
    let m; try{m=JSON.parse(payload.toString());}catch{return;}
    if (!m) return;
    if (m.type === 'heartbeat') {
      if (document.getElementById('pg-conn').classList.contains('show')) {
        setMsg('Spelscherm gevonden ✓','ok');
        setTimeout(() => goPlay(m), 600);
      } else {
        // Only update title/bpm from heartbeat, NOT score (score comes via fb)
        if (m.title !== undefined)
          document.getElementById('info').textContent = (m.title||'—') + (m.bpm?' · '+m.bpm+' BPM':'');
      }
    }
    if (m.type === 'score_update' && m.playerId === pid) {
      updHUD(m);
    }
    if (m.type === 'fb') {
      // Only show feedback for this player's hits/misses
      // If playerId is set, only react if it matches ours; otherwise show all
      if (!m.playerId || m.playerId === pid) {
        showFB(m.text, m.color);
        updHUD(m);
      }
    }
  });
  mqttClient.on('error', () => setMsg('Relay fout — herverbinden…','err'));
  mqttClient.on('close', () => {
    if (document.getElementById('pg-play').classList.contains('show'))
      document.getElementById('mlbl').textContent = '⚠ Verbroken — herstelpoging…';
  });
}

function mqttPub(data) {
  if (!mqttClient||!mqttClient.connected||!roomCode) return;
  try { mqttClient.publish('hardstyle-hero/'+roomCode+'/mobile/'+pid, JSON.stringify(data), {qos:0}); } catch(e){}
}

function goPlay(m) {
  show('pg-play'); if(m) updHUD(m); startMotion();
}

function updHUD(m) {
  if (m.title !== undefined)
    document.getElementById('info').textContent = (m.title||'—') + (m.bpm?' · '+m.bpm+' BPM':'');
  if (m.sc !== undefined) document.getElementById('sc').textContent = String(m.sc).padStart(6,'0');
  if (m.cb !== undefined) document.getElementById('cb').textContent = 'x'+m.cb;
}

function doDisc() {
  mqttPub({type:'leave'});
  if (mqttClient){try{mqttClient.end(true);}catch(e){}}
  mqttClient=null; clearTimeout(null);
  stopMotion(); show('pg-conn');
  document.getElementById('conn-btn').disabled=false;
  setMsg('Klaar','inf');
}

// ── Tap ──
function onTouchHit(e) { e.preventDefault(); doHit(); visual(true); }
function onTouchEnd(e) { e.preventDefault(); visual(false); }
function onHit() { doHit(); visual(true); }
function onUnhit() { visual(false); }
function visual(on) {
  const k=document.getElementById('kick');
  k.classList.toggle('hi',on);
}
function doHit() {
  if (tapCD) return; tapCD=true; setTimeout(()=>tapCD=false,90);
  mqttPub({type:'hit', seq:++hitSeq});
  if (navigator.vibrate) navigator.vibrate(28);
}

// ── Motion ──
let motionOn=false, motCD=false, lastMag=0, threshold=18;
function setSens(v) { threshold=Math.round(29-v); }
function startMotion() {
  if (motionOn) return;
  if (!motionOK||typeof DeviceMotionEvent==='undefined') {
    document.getElementById('mlbl').textContent='Gebruik de knop';
    document.getElementById('khint').textContent='tik om te spelen'; return;
  }
  window.addEventListener('devicemotion',onMotion,{passive:true});
  motionOn=true;
  document.getElementById('mlbl').textContent='✓ Schud of tik de knop';
  document.getElementById('khint').textContent='schud of tik';
}
function stopMotion() { if(!motionOn)return; window.removeEventListener('devicemotion',onMotion); motionOn=false; }
function onMotion(e) {
  const a=e.accelerationIncludingGravity||e.acceleration; if(!a)return;
  const mag=Math.sqrt((a.x||0)**2+(a.y||0)**2+(a.z||0)**2);
  const d=Math.abs(mag-lastMag); lastMag=mag;
  const pct=Math.min(100,d/(threshold*1.4)*100);
  document.getElementById('mbar').style.width=pct+'%';
  if (d>threshold&&!motCD){motCD=true;setTimeout(()=>motCD=false,150);doHit();}
}

// ── Feedback ──
let fbT=null;
function showFB(txt,color) {
  const el=document.getElementById('fb');
  el.textContent=txt; el.style.color=color||'#fff'; el.style.opacity='1';
  clearTimeout(fbT); fbT=setTimeout(()=>el.style.opacity='0',480);

  // Haptic feedback — different pattern per hit type
  if(navigator.vibrate){
    if(txt==='PERFECT!'){
      // Two short sharp pulses — voelbaar en duidelijk
      navigator.vibrate([40, 30, 40]);
    } else if(txt==='GOOD'){
      // One medium pulse
      navigator.vibrate(55);
    } else if(txt==='MISS'){
      // One long dull buzz
      navigator.vibrate(120);
    }
  }
}

// ── Enter key ──
document.getElementById('code').addEventListener('keydown',e=>{ if(e.key==='Enter') doConn(); });
document.getElementById('pname').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('code').focus(); });
</script>
</body>
</html>
