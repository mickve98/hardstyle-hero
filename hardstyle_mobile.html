<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Hardstyle Controller</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  background:#04000a; color:#fff;
  font-family:Arial, sans-serif;
  height:100%; overflow:hidden;
  /* NO touch-action restrictions */
}
.pg {
  display:none; flex-direction:column; align-items:center;
  justify-content:center; height:100vh; padding:28px 20px;
  gap:16px; text-align:center;
}
.pg.show { display:flex; }

h1 {
  font-size:1.5rem; letter-spacing:.1em;
  background:linear-gradient(90deg,#ff0080,#00f5ff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
p { font-size:.85rem; color:rgba(255,255,255,.45); line-height:1.7; max-width:280px; }

input[type=text] {
  width:100%; max-width:280px; text-align:center;
  font-size:2.2rem; letter-spacing:.3em;
  background:rgba(255,255,255,.07);
  border:2px solid rgba(255,255,255,.2);
  color:#fff; padding:12px 8px; border-radius:6px; outline:none;
  -webkit-appearance:none;
}
input[type=text]:focus { border-color:#00f5ff; }

button.btn {
  width:100%; max-width:280px; padding:16px;
  font-size:.9rem; font-weight:700; letter-spacing:.1em;
  border:none; border-radius:6px; cursor:pointer;
  -webkit-appearance:none; appearance:none;
  transition:opacity .15s;
}
button.btn:active { opacity:.7; }
button.btn:disabled { opacity:.3; }
.pink  { background:#ff0080; color:#000; }
.yell  { background:transparent; border:2px solid #ffee00 !important; color:#ffee00; }
.dim   { background:transparent; border:1px solid rgba(255,255,255,.2) !important; color:rgba(255,255,255,.4); font-size:.8rem; }

#msg { font-size:.82rem; min-height:1.2em; }
#msg.ok  { color:#00ff88; }
#msg.err { color:#ff5555; }
#msg.inf { color:rgba(255,255,255,.4); }

/* play screen */
#info { font-size:.65rem; color:rgba(255,255,255,.28); letter-spacing:.08em;
        max-width:88vw; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.hrow { display:flex; gap:20px; align-items:baseline; }
#sc { font-size:1.8rem; font-weight:700; color:#00f5ff; }
#cb { font-size:1.1rem; color:#ffee00; }
#fb { font-size:1.5rem; font-weight:700; min-height:1.8rem;
      transition:opacity .2s; color:#ffee00; }

/* KICK BUTTON — plain button element, no pointer-events tricks */
#kick {
  width: min(70vw, 58vh);
  height: min(70vw, 58vh);
  border-radius: 50%;
  border: 3px solid #ff0080;
  background: rgba(255,0,128,.08);
  box-shadow: 0 0 28px rgba(255,0,128,.28);
  display: flex; align-items:center; justify-content:center;
  flex-direction:column; gap:6px;
  cursor: pointer;
  -webkit-appearance: none; appearance: none;
  flex-shrink: 0;
  /* explicit transition for feedback */
  transition: transform .07s, background .07s, box-shadow .07s;
  /* allow touch events */
  touch-action: none;
}
#kick span { font-size:1.1rem; font-weight:700; letter-spacing:.15em; pointer-events:none; }
#kick small { font-size:.65rem; color:rgba(255,255,255,.32); pointer-events:none; }

.sens-row { display:flex; align-items:center; gap:8px; font-size:.7rem; color:rgba(255,255,255,.3); }
.sens-row input { width:80px; accent-color:#ff0080; }
.mbar-bg { width:70px; height:5px; background:rgba(255,255,255,.08); border-radius:3px; overflow:hidden; }
#mbar { height:100%; width:0%; background:linear-gradient(90deg,#00f5ff,#ff0080); border-radius:3px; }
#mlbl { font-size:.62rem; color:rgba(255,255,255,.25); }

#disc {
  position:fixed; top:14px; right:14px;
  padding:7px 14px; background:transparent;
  border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.3); font-size:.65rem; border-radius:4px;
  cursor:pointer; -webkit-appearance:none;
}
#disc:active { color:#ff0080; border-color:#ff0080; }
</style>
</head>
<body>

<!-- SCHERM 1: iOS SENSOR TOESTEMMING -->
<div class="pg show" id="pg-perm">
  <h1>HARDSTYLE HERO</h1>
  <p style="font-size:2rem;margin:0">📳</p>
  <p>iOS vereist toestemming voor de bewegingssensor.<br>Tik de gele knop hieronder.</p>
  <button class="btn yell" onclick="askPerm()">BEWEGINGSSENSOR TOESTAAN</button>
  <button class="btn dim"  onclick="skipPerm()">Overslaan — alleen knop</button>
  <p id="perm-note" style="min-height:1em;font-size:.8rem"></p>
</div>

<!-- SCHERM 2: VERBINDEN -->
<div class="pg" id="pg-conn">
  <h1>HARDSTYLE HERO</h1>
  <p>Voer de code in die op het spelscherm staat (klik 📱 rechtsonder)</p>
  <input type="text" id="pname" placeholder="Jouw naam"
         style="width:100%;max-width:280px;text-align:center;font-size:1.1rem;letter-spacing:.05em;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.2);color:#fff;padding:10px 8px;border-radius:6px;outline:none;margin-bottom:-4px;"
         maxlength="16" autocomplete="off" spellcheck="false">
  <input type="text" id="code" inputmode="numeric" maxlength="6"
         placeholder="000000" autocomplete="off" spellcheck="false">
  <button class="btn pink" id="conn-btn" onclick="doConn()">VERBINDEN</button>
  <div id="msg" class="inf">Klaar</div>
</div>

<!-- SCHERM 3: SPELEN -->
<div class="pg" id="pg-play">
  <button id="disc" onclick="doDisc()">LOSKOPPELEN</button>
  <div id="info">—</div>
  <div class="hrow"><div id="sc">000000</div><div id="cb">x1</div></div>
  <div id="fb" style="opacity:0">PERFECT!</div>
  <button id="kick"
          ontouchstart="onTouchHit(event)" ontouchend="onTouchEnd(event)"
          onmousedown="onHit()" onmouseup="onUnhit()">
    <span>KICK</span>
    <small id="khint">tik of schud</small>
  </button>
  <div class="sens-row">
    🌀 Gevoeligheid
    <input type="range" min="1" max="20" value="8" oninput="setSens(+this.value)">
    <div class="mbar-bg"><div id="mbar"></div></div>
  </div>
  <div id="mlbl">—</div>
</div>

<!-- MQTT.js (same version as desktop) -->
<script src="https://unpkg.com/mqtt@5.3.4/dist/mqtt.min.js"></script>
<script>
'use strict';

// ── iOS detection ──
const isIOS = typeof DeviceMotionEvent !== 'undefined'
           && typeof DeviceMotionEvent.requestPermission === 'function';
let motionOK = !isIOS; // non-iOS: already OK

if (!isIOS) show('pg-conn');

// Pre-fill code from URL ?code=
const urlCode = new URLSearchParams(location.search).get('code');
if (urlCode) document.getElementById('code').value = urlCode;

function show(id) {
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('show'));
  document.getElementById(id).classList.add('show');
}

// ── iOS permission ──
function askPerm() {
  DeviceMotionEvent.requestPermission()
    .then(s => {
      const note = document.getElementById('perm-note');
      if (s === 'granted') {
        motionOK = true;
        note.textContent = '✓ Toegestaan!';
        note.style.color = '#00ff88';
      } else {
        note.textContent = 'Geweigerd — gebruik de knop.';
        note.style.color = '#ff9944';
      }
      setTimeout(() => show('pg-conn'), 700);
    })
    .catch(() => {
      document.getElementById('perm-note').textContent = 'Niet beschikbaar.';
      setTimeout(() => show('pg-conn'), 700);
    });
}
function skipPerm() { show('pg-conn'); }

// ── MQTT relay — MULTIPLAYER ──
// Each phone has a unique persistent player ID
// Publishes to:   hardstyle-hero/CODE/mobile/PLAYERID
// Subscribes to:  hardstyle-hero/CODE/host
let mqttClient = null;
let roomCode   = '';
let hitSeq     = 0;
let tapCD      = false;

// Persistent player ID
let playerId = sessionStorage.getItem('hsh-pid');
if (!playerId) {
  playerId = 'p' + Math.random().toString(36).slice(2, 10);
  sessionStorage.setItem('hsh-pid', playerId);
}

function setMsg(t, c) {
  const el = document.getElementById('msg');
  el.textContent = t; el.className = c || 'inf';
}

function doConn() {
  roomCode = document.getElementById('code').value.replace(/\D/g, '');
  if (roomCode.length !== 6) { setMsg('Voer 6 cijfers in', 'err'); return; }
  document.getElementById('conn-btn').disabled = true;
  setMsg('Verbinden met relay…', 'inf');
  connectMqtt();
}

function connectMqtt() {
  if (mqttClient) { try { mqttClient.end(true); } catch(e) {} }
  const clientId = 'hsh-mob-' + playerId;
  mqttClient = mqtt.connect('wss://broker.hivemq.com:8884/mqtt', {
    clientId, clean: true, reconnectPeriod: 3000, connectTimeout: 10000,
  });
  mqttClient.on('connect', () => {
    mqttClient.subscribe('hardstyle-hero/' + roomCode + '/host', err => {
      if (!err) {
        setMsg('Wachten op spelscherm…', 'inf');
        const name = document.getElementById('pname')?.value?.trim() || 'Speler';
        mqttPublish({ type: 'join', name });
      } else {
        setMsg('Subscribe mislukt', 'err');
        document.getElementById('conn-btn').disabled = false;
      }
    });
  });
  mqttClient.on('message', (topic, payload) => {
    let msg;
    try { msg = JSON.parse(payload.toString()); } catch { return; }
    if (!msg) return;
    if (msg.type === 'heartbeat') {
      if (document.getElementById('pg-conn').classList.contains('show')) {
        setMsg('Spelscherm gevonden ✓', 'ok');
        setTimeout(() => goPlay(msg), 600);
      } else { updateHUD(msg); }
    }
    if (msg.type === 'fb') { showFB(msg.text, msg.color); updateHUD(msg); }
  });
  mqttClient.on('error', () => setMsg('Relay fout — herverbinden…', 'err'));
  mqttClient.on('close', () => {
    if (document.getElementById('pg-play').classList.contains('show'))
      document.getElementById('mlbl').textContent = '⚠ Verbroken — herstelpoging…';
  });
}

function mqttPublish(data) {
  if (!mqttClient || !mqttClient.connected || !roomCode) return;
  // Publish to player-specific sub-topic so desktop can identify sender
  const topic = 'hardstyle-hero/' + roomCode + '/mobile/' + playerId;
  try { mqttClient.publish(topic, JSON.stringify(data), { qos: 0 }); } catch(e) {}
}

// ── Go play ──
function goPlay(msg) {
  show('pg-play');
  if (msg) updateHUD(msg);
  startMotion();
}

function updateHUD(msg) {
  if (msg.title !== undefined)
    document.getElementById('info').textContent =
      (msg.title || '—') + (msg.bpm ? ' · ' + msg.bpm + ' BPM' : '');
  if (msg.sc !== undefined)
    document.getElementById('sc').textContent = String(msg.sc).padStart(6,'0');
  if (msg.cb !== undefined)
    document.getElementById('cb').textContent = 'x' + msg.cb;
}

function doDisc() {
  mqttPublish({ type: 'leave' });
  if (mqttClient) { try { mqttClient.end(true); } catch(e) {} mqttClient = null; }
  stopMotion();
  show('pg-conn');
  document.getElementById('conn-btn').disabled = false;
  setMsg('Klaar', 'inf');
}

// ── Tap handling ──
// Use both touch AND mouse events; preventDefault stops ghost clicks
function onTouchHit(e) {
  e.preventDefault(); // stop ghost mouse events
  doHit();
  document.getElementById('kick').style.transform = 'scale(.91)';
  document.getElementById('kick').style.background = 'rgba(255,0,128,.35)';
}
function onTouchEnd(e) {
  e.preventDefault();
  document.getElementById('kick').style.transform = '';
  document.getElementById('kick').style.background = '';
}
function onHit() {
  doHit();
  document.getElementById('kick').style.transform = 'scale(.91)';
  document.getElementById('kick').style.background = 'rgba(255,0,128,.35)';
}
function onUnhit() {
  document.getElementById('kick').style.transform = '';
  document.getElementById('kick').style.background = '';
}

function doHit() {
  if (tapCD) return;
  tapCD = true;
  setTimeout(() => tapCD = false, 90);
  mqttPublish({ type: 'hit', seq: ++hitSeq });
  if (navigator.vibrate) navigator.vibrate(28);
}

// ── Motion sensor ──
let motionActive = false, motCD = false, lastMag = 0, threshold = 18;

function setSens(v) { threshold = Math.round(29 - v); }

function startMotion() {
  if (motionActive) return;
  if (!motionOK || typeof DeviceMotionEvent === 'undefined') {
    document.getElementById('mlbl').textContent = 'Gebruik de knop — sensor niet beschikbaar';
    document.getElementById('khint').textContent = 'tik om te spelen';
    return;
  }
  window.addEventListener('devicemotion', onMotion, { passive: true });
  motionActive = true;
  document.getElementById('mlbl').textContent = '✓ Schud op de kick of tik de knop';
  document.getElementById('khint').textContent = 'schud of tik';
}

function stopMotion() {
  if (!motionActive) return;
  window.removeEventListener('devicemotion', onMotion);
  motionActive = false;
}

function onMotion(e) {
  const a = e.accelerationIncludingGravity || e.acceleration;
  if (!a) return;
  const mag = Math.sqrt((a.x||0)**2 + (a.y||0)**2 + (a.z||0)**2);
  const d   = Math.abs(mag - lastMag);
  lastMag   = mag;

  const pct = Math.min(100, d / (threshold * 1.4) * 100);
  document.getElementById('mbar').style.width = pct + '%';

  if (d > threshold && !motCD) {
    motCD = true;
    setTimeout(() => motCD = false, 150);
    doHit();
  }
}

// ── Feedback ──
let fbT = null;
function showFB(txt, color) {
  const el = document.getElementById('fb');
  el.textContent = txt; el.style.color = color || '#fff'; el.style.opacity = '1';
  clearTimeout(fbT);
  fbT = setTimeout(() => el.style.opacity = '0', 500);
}

// ── Enter key ──
document.getElementById('code').addEventListener('keydown', e => {
  if (e.key === 'Enter') doConn();
});
</script>
</body>
</html>
